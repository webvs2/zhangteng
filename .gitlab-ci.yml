# GitLab CI/CD 配置 - Vue 项目部署到 GitLab Pages
# 适用于 Node 18+ 的 Vue 项目

image: node:18-alpine

# 定义阶段
stages:
  - install
  - build
  - deploy

# 缓存配置 - 加快构建速度
cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/
    - .npm/

# 安装依赖
install:
  stage: install
  script:
    - npm ci --cache .npm --prefer-offline
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

# 构建项目
build:
  stage: build
  dependencies:
    - install
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

# 部署到 GitLab Pages
pages:
  stage: deploy
  dependencies:
    - build
  script:
    # GitLab Pages 需要从 public 目录提供内容
    - rm -rf public
    - mkdir public
    - cp -r dist/* public/
  artifacts:
    paths:
      - public
  only:
    - main
    - master
